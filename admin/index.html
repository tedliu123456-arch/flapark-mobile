<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FLAP Mobile 後台 Dashboard</title>
  <style>
    :root{--bg:#fff7fb;--card:#fff;--text:#2f2a2f;--line:#f1d9e9;--pink:#f472b6;--purple:#a78bfa;--blue:#60a5fa}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:"Noto Sans TC","PingFang TC",-apple-system,sans-serif}
    .wrap{max-width:620px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
    h1{font-size:20px;margin:0 0 10px}.muted{font-size:12px;color:#7b7280}
    .field{margin:8px 0}.field label{display:block;font-size:13px;margin-bottom:4px}.field input{width:100%;padding:10px;border:1px solid #e8d4e3;border-radius:10px;font-size:14px}
    .btn{border:0;background:linear-gradient(180deg,#f891c7,#f472b6);color:#fff;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}
    .btn.ghost{background:#fff;color:#444;border:1px solid #ddd}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.kpi{padding:12px;border-radius:12px;color:#fff}.k1{background:linear-gradient(180deg,#f9a8d4,#f472b6)}.k2{background:linear-gradient(180deg,#c4b5fd,#a78bfa)}.k3{background:linear-gradient(180deg,#93c5fd,#60a5fa)}
    .kpi .n{font-size:24px;font-weight:800}.links{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    #panel{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginBox">
      <h1>FLAP Mobile 後台 Dashboard</h1>
      <p class="muted">輸入管理 PIN 登入（與設定頁共用）。</p>
      <div class="field"><label>PIN</label><input id="pin" type="password" placeholder="輸入管理 PIN" /></div>
      <button class="btn" onclick="login()">登入</button>
    </div>

    <div id="panel">
      <div class="card">
        <h1>Dashboard</h1>
        <div class="grid">
          <div class="kpi k1"><div class="muted" style="color:#ffe8f4">今日入場</div><div class="n" id="kToday">0</div></div>
          <div class="kpi k2"><div class="muted" style="color:#efe9ff">進行中</div><div class="n" id="kActive">0</div></div>
          <div class="kpi k3"><div class="muted" style="color:#e8f3ff">總筆數</div><div class="n" id="kTotal">0</div></div>
        </div>
      </div>

      <div class="card">
        <h1>管理入口</h1>
        <div class="links">
          <a class="btn" href="./guests.html">客人資料後台</a>
          <a class="btn" href="./settings.html">手機首頁設定</a>
          <a class="btn ghost" href="https://flapark.com/admin" target="_blank">原後台 Dashboard</a>
          <a class="btn ghost" href="https://flapark.com/admin/visits" target="_blank">原後台入場記錄</a>
        </div>
      </div>

      <div class="card" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn ghost" onclick="refreshKpi()">重新整理</button>
        <button class="btn ghost" onclick="logout()">登出</button>
      </div>
    </div>
  </div>

  <script>
    const PIN_KEY='flap_mobile_admin_pin';
    const OK_KEY='flap_mobile_admin_ok';
    const GUEST_KEY='flap_mobile_guest_records_v1';

    function getGuests(){
      try{return JSON.parse(localStorage.getItem(GUEST_KEY)||'[]');}
      catch{return []}
    }

    function refreshKpi(){
      const rows=getGuests();
      const today=(new Date()).toISOString().slice(0,10);
      const isToday=(t)=>String(t||'').slice(0,10)===today;
      const active=rows.filter(r=>!r.checkoutTime).length;
      const todayCount=rows.filter(r=>isToday(r.checkinTime)).length;
      document.getElementById('kTotal').textContent=rows.length;
      document.getElementById('kActive').textContent=active;
      document.getElementById('kToday').textContent=todayCount;
    }

    function login(){
      const pin=document.getElementById('pin').value.trim();
      if(!pin) return alert('請輸入 PIN');
      const saved=localStorage.getItem(PIN_KEY);
      if(!saved) return alert('尚未設定 PIN，請先到 settings.html 第一次登入設定');
      if(saved!==pin) return alert('PIN 錯誤');
      localStorage.setItem(OK_KEY,'1');
      enter();
    }

    function enter(){
      document.getElementById('loginBox').style.display='none';
      document.getElementById('panel').style.display='block';
      refreshKpi();
    }

    function logout(){
      localStorage.removeItem(OK_KEY);
      location.reload();
    }

    if(localStorage.getItem(OK_KEY)==='1') enter();
  </script>
</body>
</html>
