<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FLAP 今日資料分析</title>
  <style>
    body{font-family:"Noto Sans TC",-apple-system,sans-serif;background:#fff7fb;color:#2f2a2f;margin:0}
    .wrap{max-width:720px;margin:0 auto;padding:16px}
    .card{background:#fff;border:1px solid #f1d9e9;border-radius:14px;padding:14px;margin:10px 0}
    h1{margin:0 0 8px;font-size:22px}
    h2{margin:0 0 8px;font-size:17px}
    .muted{color:#7b7280;font-size:13px}
    .kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .k{background:#fdf2f8;border-radius:10px;padding:10px}
    .n{font-size:24px;font-weight:800}
    li{margin:4px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>FLAP 今日資料分析</h1>
      <div class="muted">日期：2026-04-04（更新時間：2026-04-04 19:11 GMT+8）</div>
    </div>

    <div class="card">
      <h2>核心指標</h2>
      <div class="kpi">
        <div class="k">入場筆數<div class="n">50</div></div>
        <div class="k">大人數量<div class="n">50</div></div>
        <div class="k">孩童總數<div class="n">92</div></div>
        <div class="k">平均年齡<div class="n">6.93</div></div>
      </div>
    </div>

    <div class="card">
      <h2>年齡分布</h2>
      <ul>
        <li>0–2 歲：8</li>
        <li>3–5 歲：24</li>
        <li>6–8 歲：28</li>
        <li>9 歲以上：32</li>
      </ul>
    </div>

    <div class="card">
      <h2>入場時段（Top 3）</h2>
      <ul>
        <li>10:00–10:59：11</li>
        <li>11:00–11:59：9</li>
        <li>14:00–14:59：9（15:00–15:59 也是 9）</li>
      </ul>
    </div>
  </div>
</body>
</html>
