<!doctype html>
<html lang="zh-Hant" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>粉獅堡 F.L.A.P｜Mobile</title>
  <style>
    :root{
      --bg:#fff7fb;
      --card:#ffffff;
      --text:#2f2a2f;
      --muted:#7b7280;
      --line:#f1d9e9;
      --pink:#f472b6;
      --purple:#a78bfa;
      --blue:#60a5fa;
      --green:#34d399;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:"Noto Sans TC","PingFang TC",-apple-system,sans-serif}
    .wrap{max-width:460px;margin:0 auto;min-height:100dvh;padding-bottom:26px}
    .header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .header-inner{padding:12px 14px;display:flex;justify-content:center;align-items:center}
    .logo{height:38px;width:auto;border-radius:12px}

    .hero{padding:16px 14px 10px}
    .title{margin:0;font-size:18px;font-weight:800;text-align:center}
    .subtitle{margin:6px 0 0;text-align:center;color:var(--muted);font-size:13px}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 14px}
    .card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:16px 10px;border-radius:18px;border:1px solid var(--line);background:var(--card);text-decoration:none;color:inherit;box-shadow:0 8px 22px rgba(244,114,182,.14);transition:transform .12s ease,box-shadow .16s ease}
    .card:active{transform:translateY(1px) scale(.99)}
    .icon{height:52px;width:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:23px;font-weight:700}
    .pink{background:linear-gradient(180deg,#f9a8d4,#f472b6)}
    .purple{background:linear-gradient(180deg,#c4b5fd,#a78bfa)}
    .blue{background:linear-gradient(180deg,#93c5fd,#60a5fa)}
    .green{background:linear-gradient(180deg,#6ee7b7,#34d399)}
    .label{font-size:14px;font-weight:700;letter-spacing:.2px}

    .info{margin:12px 14px 0;padding:14px;border-radius:16px;background:#fff;border:1px solid var(--line)}
    .info h2{margin:0 0 10px;font-size:15px}
    .row{display:flex;gap:8px;align-items:flex-start;margin:8px 0;font-size:14px;color:#4b4450}
    .dot{margin-top:7px;height:7px;width:7px;border-radius:99px;background:#f472b6;flex:none}
    .row a{color:#4b4450}

    @media (min-width:768px){
      .wrap{max-width:720px}
      .grid{grid-template-columns:repeat(3,1fr)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="header-inner">
        <img class="logo" src="https://flapark.com/img/logo.jpg" alt="粉獅堡" />
      </div>
    </header>

    <section class="hero">
      <h1 class="title">粉獅堡 F.L.A.P｜手機版入口</h1>
      <p class="subtitle">Mobile-first 快速入口（不影響原站）</p>
    </section>

    <main class="grid">
      <a class="card" href="https://flapark.com/consent">
        <div class="icon pink">📄</div>
        <div class="label">同意書</div>
      </a>
      <a class="card" href="https://flapark.com/course">
        <div class="icon purple">📚</div>
        <div class="label">粉獅課程</div>
      </a>
      <a class="card" href="https://flapark.com/reservation">
        <div class="icon blue">📅</div>
        <div class="label">課程預約</div>
      </a>
      <a class="card" target="_blank" href="https://line.me/R/ti/p/@472petgm">
        <div class="icon green">LINE</div>
        <div class="label">官方 LINE</div>
      </a>
      <a class="card" target="_blank" href="https://www.facebook.com/share/17yf4x5bfZ/?mibextid=wwXIfr">
        <div class="icon blue">f</div>
        <div class="label">官方 FB</div>
      </a>
      <a class="card" href="#info">
        <div class="icon pink">ℹ️</div>
        <div class="label">店家資訊</div>
      </a>
    </main>

    <section id="info" class="info">
      <h2>店家資訊</h2>
      <div class="row"><span class="dot"></span><a target="_blank" href="https://share.google/ZVUlhPTL46qbcJrTc">新竹縣竹北市勝利十一路225號</a></div>
      <div class="row"><span class="dot"></span><a href="tel:036581908">03-658-1908</a></div>
      <div class="row"><span class="dot"></span><a target="_blank" href="https://line.me/R/ti/p/@472petgm">@472petgm</a></div>
    </section>
  </div>
</body>
</html>
