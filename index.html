<!doctype html>
<html lang="zh-Hant" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>粉獅堡 F.L.A.P｜Mobile</title>
  <style>
    :root{--bg:#fff7fb;--card:#fff;--text:#2f2a2f;--muted:#7b7280;--line:#f1d9e9;--pink:#f472b6;--purple:#a78bfa;--blue:#60a5fa;--green:#34d399}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:"Noto Sans TC","PingFang TC",-apple-system,sans-serif}
    .wrap{max-width:460px;margin:0 auto;min-height:100dvh;padding-bottom:26px}
    .header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .header-inner{padding:12px 14px;display:flex;justify-content:space-between;align-items:center}.logo{height:38px;border-radius:12px}
    .admin-link{font-size:12px;color:#9a8ca0;text-decoration:none}
    .hero{padding:16px 14px 10px}.title{margin:0;font-size:18px;font-weight:800;text-align:center}.subtitle{margin:6px 0 0;text-align:center;color:var(--muted);font-size:13px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 14px}
    .card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:16px 10px;border-radius:18px;border:1px solid var(--line);background:var(--card);text-decoration:none;color:inherit;box-shadow:0 8px 22px rgba(244,114,182,.14);transition:transform .12s ease,box-shadow .16s ease}
    .card:active{transform:translateY(1px) scale(.99)}.icon{height:52px;width:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:23px;font-weight:700}
    .pink{background:linear-gradient(180deg,#f9a8d4,#f472b6)}.purple{background:linear-gradient(180deg,#c4b5fd,#a78bfa)}.blue{background:linear-gradient(180deg,#93c5fd,#60a5fa)}.green{background:linear-gradient(180deg,#6ee7b7,#34d399)}
    .label{font-size:14px;font-weight:700;letter-spacing:.2px}
    .info{margin:12px 14px 0;padding:14px;border-radius:16px;background:#fff;border:1px solid var(--line)}.info h2{margin:0 0 10px;font-size:15px}
    .row{display:flex;gap:8px;align-items:flex-start;margin:8px 0;font-size:14px;color:#4b4450}.dot{margin-top:7px;height:7px;width:7px;border-radius:99px;background:#f472b6;flex:none}.row a{color:#4b4450}
    @media (min-width:768px){.wrap{max-width:720px}.grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header"><div class="header-inner"><img class="logo" src="https://flapark.com/img/logo.jpg" alt="粉獅堡" /><a class="admin-link" href="./admin/">管理</a></div></header>
    <section class="hero"><h1 class="title" id="pageTitle">粉獅堡 F.L.A.P｜手機版入口</h1><p class="subtitle" id="pageSubtitle">Mobile-first 快速入口（不影響原站）</p></section>
    <main class="grid" id="menuGrid"></main>
    <section id="info" class="info"><h2>店家資訊</h2><div id="infoRows"></div></section>
  </div>

  <script>
    const KEY='flap_mobile_config_v1';
    const defaults={
      title:'粉獅堡 F.L.A.P｜手機版入口',
      subtitle:'Mobile-first 快速入口（不影響原站）',
      menu:[
        {label:'同意書',href:'https://flapark.com/consent',icon:'📄',tone:'pink',newTab:false},
        {label:'粉獅課程',href:'https://flapark.com/course',icon:'📚',tone:'purple',newTab:false},
        {label:'課程預約',href:'https://flapark.com/reservation',icon:'📅',tone:'blue',newTab:false},
        {label:'官方 LINE',href:'https://line.me/R/ti/p/@472petgm',icon:'LINE',tone:'green',newTab:true},
        {label:'官方 FB',href:'https://www.facebook.com/share/17yf4x5bfZ/?mibextid=wwXIfr',icon:'f',tone:'blue',newTab:true},
        {label:'店家資訊',href:'#info',icon:'ℹ️',tone:'pink',newTab:false}
      ],
      info:[
        {text:'新竹縣竹北市勝利十一路225號',href:'https://share.google/ZVUlhPTL46qbcJrTc'},
        {text:'03-658-1908',href:'tel:036581908'},
        {text:'@472petgm',href:'https://line.me/R/ti/p/@472petgm'}
      ]
    };

    function loadConfig(){
      try{return {...defaults,...JSON.parse(localStorage.getItem(KEY)||'{}')};}
      catch{return defaults;}
    }
    const cfg=loadConfig();
    document.getElementById('pageTitle').textContent=cfg.title||defaults.title;
    document.getElementById('pageSubtitle').textContent=cfg.subtitle||defaults.subtitle;

    const grid=document.getElementById('menuGrid');
    grid.innerHTML=(cfg.menu||defaults.menu).map(i=>`<a class="card" href="${i.href||'#'}" ${i.newTab?'target="_blank"':''}><div class="icon ${i.tone||'pink'}">${i.icon||'•'}</div><div class="label">${i.label||''}</div></a>`).join('');

    const info=document.getElementById('infoRows');
    info.innerHTML=(cfg.info||defaults.info).map(i=>`<div class="row"><span class="dot"></span><a ${String(i.href||'').startsWith('http')?'target="_blank"':''} href="${i.href||'#'}">${i.text||''}</a></div>`).join('');
  </script>
</body>
</html>
