<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FLAP Park｜來客分析中心</title>
  <style>
    :root{--bg:#fff7fb;--card:#fff;--text:#2f2a2f;--muted:#7b7280;--line:#f1d9e9;--pink:#f472b6;--purple:#a78bfa;--blue:#60a5fa}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:"Noto Sans TC","PingFang TC",-apple-system,sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:14px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0}
    h1{margin:0 0 8px;font-size:22px} h2{margin:0 0 8px;font-size:17px}
    .muted{color:var(--muted);font-size:13px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:700px){.row{grid-template-columns:1fr}}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    @media(max-width:700px){.kpi{grid-template-columns:repeat(2,1fr)}}
    .box{border-radius:12px;color:#fff;padding:10px}
    .p1{background:linear-gradient(180deg,#f9a8d4,#f472b6)}
    .p2{background:linear-gradient(180deg,#c4b5fd,#a78bfa)}
    .p3{background:linear-gradient(180deg,#93c5fd,#60a5fa)}
    .p4{background:linear-gradient(180deg,#86efac,#4ade80)}
    .n{font-size:24px;font-weight:800}
    .field{margin:8px 0}
    .field input,.field textarea{width:100%;padding:10px;border:1px solid #e9d8e5;border-radius:10px}
    .btn{border:0;background:linear-gradient(180deg,#f9a8d4,#f472b6);color:#fff;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}
    .btn.ghost{background:#fff;color:#444;border:1px solid #ddd}
    .bars{display:flex;align-items:flex-end;gap:8px;height:180px;border-bottom:1px solid #eee;padding-top:8px}
    .bar{flex:1;min-width:26px;background:#93c5fd;border-radius:8px 8px 0 0;position:relative}
    .bar span{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:12px;color:#444}
    .bar b{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:#666;font-weight:600}
    .list li{margin:4px 0}
    .toplinks{display:flex;gap:8px;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>FLAP Park 來客分析中心</h1>
      <div class="muted">手機版優先｜可直接分析今日入場、年齡分布、新舊客比例、入場時段</div>
      <div class="toplinks" style="margin-top:8px">
        <a class="btn ghost" href="./admin/">後台 Dashboard</a>
        <a class="btn ghost" href="./admin/guests.html">客人資料後台</a>
        <a class="btn ghost" href="./admin/settings.html">首頁設定</a>
      </div>
    </div>

    <div class="card">
      <h2>資料來源</h2>
      <div class="row">
        <div>
          <button class="btn" onclick="loadLocal()">載入目前瀏覽器客人資料</button>
          <div class="muted" style="margin-top:6px">來源：localStorage `flap_mobile_guest_records_v1`</div>
        </div>
        <div>
          <input id="jsonFile" type="file" accept="application/json" onchange="loadFile(event)" />
          <div class="muted">或上傳 JSON（由客人資料後台匯出）</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>分析日期</h2>
      <div class="field"><input id="date" type="date" /></div>
      <button class="btn" onclick="run()">開始分析</button>
    </div>

    <div class="card">
      <h2>核心指標</h2>
      <div class="kpi">
        <div class="box p1"><div>入場筆數</div><div class="n" id="kVisit">0</div></div>
        <div class="box p2"><div>大人數量</div><div class="n" id="kAdult">0</div></div>
        <div class="box p3"><div>孩童總數</div><div class="n" id="kChild">0</div></div>
        <div class="box p4"><div>平均年齡</div><div class="n" id="kAge">0</div></div>
      </div>
    </div>

    <div class="row">
      <div class="card">
        <h2>年齡分布</h2>
        <ul class="list" id="ageList"></ul>
      </div>
      <div class="card">
        <h2>新舊客比例</h2>
        <ul class="list" id="newOldList"></ul>
      </div>
    </div>

    <div class="card">
      <h2>入場時段分析（Top 3）</h2>
      <div id="top3" class="muted">—</div>
      <div class="bars" id="bars"></div>
    </div>
  </div>

  <script>
    const KEY='flap_mobile_guest_records_v1';
    let DATA=[];
    const p=n=>String(n).padStart(2,'0');
    const today=new Date();
    document.getElementById('date').value=`${today.getFullYear()}-${p(today.getMonth()+1)}-${p(today.getDate())}`;

    function loadLocal(){
      try{ DATA=JSON.parse(localStorage.getItem(KEY)||'[]'); alert(`已載入 ${DATA.length} 筆`);}catch{alert('載入失敗');}
    }

    function loadFile(e){
      const f=e.target.files?.[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{ try{ DATA=JSON.parse(String(r.result||'[]')); alert(`已載入 ${DATA.length} 筆`);}catch{alert('JSON 格式錯誤');} };
      r.readAsText(f);
    }

    function parseAges(s){
      return String(s||'').split(/[，,\s]+/).map(x=>Number(x)).filter(n=>Number.isFinite(n) && n>=0 && n<=18);
    }

    function sameDate(iso,dateStr){ return String(iso||'').slice(0,10)===dateStr; }

    function run(){
      const dateStr=document.getElementById('date').value;
      if(!DATA.length) return alert('請先載入資料');
      const todayRows=DATA.filter(r=>sameDate(r.checkinTime,dateStr));

      const adults=todayRows.length;
      const ageArr=todayRows.flatMap(r=>parseAges(r.childAges));
      const childCount=ageArr.length;
      const avg=childCount ? (ageArr.reduce((a,b)=>a+b,0)/childCount).toFixed(1) : '0.0';

      document.getElementById('kVisit').textContent=todayRows.length;
      document.getElementById('kAdult').textContent=adults;
      document.getElementById('kChild').textContent=childCount;
      document.getElementById('kAge').textContent=avg;

      const bucket={
        '0-2歲':ageArr.filter(a=>a<=2).length,
        '3-5歲':ageArr.filter(a=>a>=3&&a<=5).length,
        '6-8歲':ageArr.filter(a=>a>=6&&a<=8).length,
        '9歲以上':ageArr.filter(a=>a>=9).length,
      };
      document.getElementById('ageList').innerHTML=Object.entries(bucket).map(([k,v])=>`<li>${k}：<b>${v}</b></li>`).join('');

      // 新舊客：同電話/同家長，是否在 dateStr 前出現
      const seenBefore=new Set(DATA.filter(r=>String(r.checkinTime||'').slice(0,10)<dateStr).map(r=>(r.phone||'')+'|'+(r.parentName||'')));
      let newC=0, oldC=0;
      for(const r of todayRows){
        const key=(r.phone||'')+'|'+(r.parentName||'');
        if(seenBefore.has(key)) oldC++; else newC++;
      }
      const nPct=todayRows.length?((newC/todayRows.length)*100).toFixed(1):'0.0';
      const oPct=todayRows.length?((oldC/todayRows.length)*100).toFixed(1):'0.0';
      document.getElementById('newOldList').innerHTML=`<li>新客：<b>${newC}</b>（${nPct}%）</li><li>舊客：<b>${oldC}</b>（${oPct}%）</li>`;

      // 時段
      const hm={};
      for(const r of todayRows){
        const t=String(r.checkinTime||'');
        const h=t.slice(11,13);
        if(!h) continue;
        hm[h]=(hm[h]||0)+1;
      }
      const arr=Object.entries(hm).map(([h,c])=>({h,c})).sort((a,b)=>b.c-a.c||a.h.localeCompare(b.h));
      const top3=arr.slice(0,3).map(x=>`${x.h}:00-${x.h}:59（${x.c}）`).join('、') || '—';
      document.getElementById('top3').textContent=top3;

      const timeline=Object.entries(hm).sort((a,b)=>a[0].localeCompare(b[0]));
      const max=Math.max(1,...timeline.map(x=>x[1]));
      document.getElementById('bars').innerHTML=timeline.map(([h,c])=>`<div class="bar" style="height:${Math.round(c/max*160)}px"><span>${c}</span><b>${h}</b></div>`).join('');
    }
  </script>
</body>
</html>
