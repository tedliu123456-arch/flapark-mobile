name: FLAP half-hour sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Sync from FLAP admin
        env:
          FLAP_ADMIN_USER: ${{ secrets.FLAP_ADMIN_USER }}
          FLAP_ADMIN_PASS: ${{ secrets.FLAP_ADMIN_PASS }}
        run: npm run sync:data

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add today-data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore(sync): auto update today-data.json"
            git push
          fi
